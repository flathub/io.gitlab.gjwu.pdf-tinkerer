app-id: io.gitlab.gjwu.pdf-tinkerer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk
command: PDF-Tinkerer-runner
finish-args:
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-desktop
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-public-share
  - --filesystem=xdg-templates
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk/install.sh
  - name: PDF-Tinkerer
    buildsystem: simple
    build-commands:
      - install -Dm644 PDF-Tinkerer-11.6-minimal.jar /app/lib/PDF-Tinkerer.jar
      - mkdir -p /app/lib/sdk
      - mv lib/* /app/lib/sdk/
      - install -Dm755 PDF-Tinkerer-runner /app/bin/PDF-Tinkerer-runner
      - install -Dm644 io.gitlab.gjwu.pdf-tinkerer.svg /app/share/icons/hicolor/scalable/apps/io.gitlab.gjwu.pdf-tinkerer.svg
      - desktop-file-install io.gitlab.gjwu.pdf-tinkerer.desktop --dir=/app/share/applications
      - install -Dm644 io.gitlab.gjwu.pdf-tinkerer.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: file
        dest-filename: PDF-Tinkerer-11.6-minimal.jar
        url: https://gitlab.com/gjwu/pdf-tinkerer/-/package_files/308563375/download
        sha256: 7bee38d7c2179a61334ac4642d45463d5ecaac869d5e33e0c0557d23e7e0ecd2
      - type: archive
        url: https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_linux-x64_bin-sdk.zip
        sha256: fbf3e214915dede36e791c07906abc1c32babc59bb26e2f41edbdcbc33400fb5
        only-arches:
          - x86_64
      - type: archive
        url: https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_linux-aarch64_bin-sdk.zip
        sha256: 8a37339267bcab1280f1b7d3e44e00974810f94f37a6261e0700a281c965db32
        only-arches:
          - aarch64
      - type: file
        dest-filename: io.gitlab.gjwu.pdf-tinkerer.svg
        url: https://gitlab.com/gjwu/pdf-tinkerer/-/raw/v11.6/PDF-Tinkerer.svg
        sha256: 2a753106da6cd6a63650d96871e7dc6aa4313e7dead622443e561367b777609f
      - type: file
        dest-filename: io.gitlab.gjwu.pdf-tinkerer.desktop
        url: https://gitlab.com/gjwu/pdf-tinkerer/-/raw/v11.6/templates/io.gitlab.gjwu.pdf-tinkerer.desktop
        sha256: 119ec0203b3b33743a50b7b08b56971df8325e869601db755acadeee919c3e01
      - type: file
        dest-filename: io.gitlab.gjwu.pdf-tinkerer.metainfo.xml
        url: https://gitlab.com/gjwu/pdf-tinkerer/-/raw/v11.6/templates/io.gitlab.gjwu.pdf-tinkerer.metainfo.xml
        sha256: 099584aa9d8fe1392247ff1976ce634e47d48795a23d0799486f2af3b9f818b9
      - type: script
        dest-filename: PDF-Tinkerer-runner
        commands:
          - exec /app/jre/bin/java -Djava.io.tmpdir="$XDG_CACHE_HOME" -Djava.util.prefs.userRoot="$XDG_CONFIG_HOME" --module-path /app/lib/sdk --add-modules javafx.web,javafx.fxml,javafx.swing,javafx.media
            --add-exports=javafx.graphics/com.sun.javafx.css=ALL-UNNAMED --enable-native-access=ALL-UNNAMED --enable-native-access=javafx.graphics -cp /app/lib/PDF-Tinkerer.jar pdf_tinkerer.PDFTinkererKt  "$@"
